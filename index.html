<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Sports</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #0e0a1a 0%, #06070d 100%);
            --card-bg: #111425;
            --neon-cyan: #00f0ff;
            --neon-pink: #ff007f;
            --text-main: #ffffff;
            --text-muted: #7d899c;
            --border-color: #1a1f38;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        /* Responsive Wrapper: Full width on mobile, centered block on desktop */
        .app-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            background: #06070d;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: #0e0a1a;
            position: sticky;
            top: 0;
            z-index: 110;
        }

        header .logo {
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(to right, #ffffff, #c2c7ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header .icons i {
            font-size: 18px;
            margin-left: 20px;
            cursor: pointer;
            color: #fff;
        }

        /* Marquee Ticker Section */
        .ticker-container {
            background: rgba(0, 240, 255, 0.04);
            padding: 8px 14px;
            border-top: 1px solid rgba(0, 240, 255, 0.12);
            border-bottom: 1px solid rgba(0, 240, 255, 0.12);
            font-size: 12px;
            color: var(--neon-cyan);
            overflow: hidden;
            white-space: nowrap;
        }

        .ticker-text {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 20s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        .main-content {
            flex: 1;
            padding: 16px 16px 90px 16px;
            overflow-y: auto;
        }

        .app-view { display: none; }
        .app-view.active { display: block; }

        /* Video Player Styling */
        .video-box {
            width: 100%;
            background: #000;
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 16px;
            border: 1px solid var(--border-color);
            display: none;
        }
        .video-box.active { display: block; }

        video {
            width: 100%;
            aspect-ratio: 16/9;
            display: block;
        }

        /* Horizontal Sports Circular Tabs */
        .sports-nav {
            display: flex;
            gap: 14px;
            overflow-x: auto;
            padding: 4px 2px 16px 2px;
        }
        .sports-nav::-webkit-scrollbar { display: none; }

        .sport-tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 56px;
            cursor: pointer;
        }

        .sport-circle {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: #141226;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #23223f;
            margin-bottom: 6px;
            font-size: 18px;
        }

        .sport-tab.active .sport-circle {
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.35);
        }
        .sport-tab span { font-size: 11px; color: #cbd5e1; }

        /* Filter Row Badges */
        .filter-row {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            overflow-x: auto;
        }
        .filter-row::-webkit-scrollbar { display: none; }

        .filter-btn {
            background: #111424;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            white-space: nowrap;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filter-btn.active {
            border: 1.5px solid var(--neon-cyan);
            color: #fff;
            font-weight: bold;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--neon-pink);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--neon-pink);
        }

        /* Match Card & Overlay Layouts */
        .match-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 14px;
            border: 1px solid var(--border-color);
            position: relative;
            cursor: pointer;
        }

        .match-card::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 16px;
            padding: 1.2px;
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(255, 0, 127, 0.2));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .time-badge {
            background: var(--neon-pink);
            color: #fff;
            padding: 2px 7px;
            border-radius: 5px;
            font-size: 10px;
            font-weight: bold;
        }

        .live-text {
            color: var(--neon-pink);
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: bold;
        }

        .team-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .team-info { display: flex; flex-direction: column; gap: 10px; }
        .team-row { display: flex; align-items: center; gap: 12px; font-size: 15px; font-weight: 500; }
        .flag-icon { width: 22px; height: 22px; border-radius: 50%; }

        .card-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .badge-list { display: flex; gap: 6px; }
        .server-mini {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: #1c2038;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 9px;
            font-weight: bold;
            border: 1px solid #353d66;
        }

        .view-title { font-size: 18px; font-weight: 600; color: #e2e8f0; margin-bottom: 15px; }

        /* Grid Categories Structure */
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .grid-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 14px 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
        }

        .grid-circle {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: #191c32;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 8px;
            border: 1px solid #2a3154;
            font-size: 16px;
        }

        .grid-card span {
            font-size: 11px;
            font-weight: 500;
            color: #e2e8f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        /* Settings View Layout */
        .settings-top { text-align: center; padding: 15px 0; }
        .app-avatar {
            width: 64px;
            height: 64px;
            background: #181b33;
            border-radius: 16px;
            margin: 0 auto 12px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0,240,255,0.2);
        }

        .social-box { display: flex; justify-content: center; gap: 16px; margin: 16px 0; }
        .social-circle {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            background: #111424;
            border: 1px solid var(--border-color);
            cursor: pointer;
        }

        .group-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin: 20px 0 8px 0;
            letter-spacing: 0.6px;
        }

        .option-tile {
            background: var(--card-bg);
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            font-size: 14px;
        }
        .option-tile:first-child { border-top-left-radius: 12px; border-top-right-radius: 12px; }
        .option-tile:last-child { border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; border-bottom: none; }

        .tile-left { display: flex; align-items: center; gap: 14px; }
        .tile-left i { width: 16px; text-align: center; color: #a5b4fc; }

        .toggle-switch {
            width: 38px;
            height: 22px;
            background: #2e355e;
            border-radius: 12px;
            position: relative;
            cursor: pointer;
        }
        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: 0.2s;
        }
        .toggle-switch.on { background: var(--neon-cyan); }
        .toggle-switch.on::after { left: 19px; }

        /* Bottom Fixed Navigation Bar */
        .navbar-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #101221;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-radius: 20px 20px 0 0;
            z-index: 100;
        }

        .nav-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            font-size: 11px;
            cursor: pointer;
            gap: 5px;
            width: 75px;
            text-decoration: none;
        }
        .nav-link i { font-size: 19px; }
        .nav-link.active { color: var(--neon-cyan); }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="logo">All Sports</div>
            <div class="icons">
                <i class="fa-solid fa-rotate-right" onclick="location.reload();"></i>
                <i class="fa-solid fa-heart"></i>
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
        </header>

        <div class="ticker-container">
            <div class="ticker-text" id="ticker-space">📢 Loading data updates...</div>
        </div>

        <div class="main-content">
            <div class="video-box" id="global-player-container">
                <video id="live-video-element" controls autoplay playsinline></video>
            </div>

            <div id="panel-live" class="app-view active">
                <div class="sports-nav">
                    <div class="sport-tab active"><div class="sport-circle"><i class="fa-solid fa-globe" style="color: #a58aff;"></i></div><span>All</span></div>
                    <div class="sport-tab"><div class="sport-circle"><i class="fa-solid fa-baseball-bat-ball" style="color: #4da6ff;"></i></div><span>Cricket</span></div>
                    <div class="sport-tab"><div class="sport-circle"><i class="fa-solid fa-w" style="color: #ff4d4d;"></i></div><span>WWE</span></div>
                    <div class="sport-tab"><div class="sport-circle"><i class="fa-solid fa-flag-checkered" style="color: #ffcc00;"></i></div><span>F1</span></div>
                    <div class="sport-tab"><div class="sport-circle"><i class="fa-solid fa-table-tennis-pools" style="color: #33cc66;"></i></div><span>Tennis</span></div>
                </div>

                <div class="filter-row">
                    <div class="filter-btn active">✓ All (33)</div>
                    <div class="filter-btn"><span class="pulse-dot"></span> Live now (4)</div>
                    <div class="filter-btn"><i class="fa-regular fa-calendar"></i> Today's (14)</div>
                </div>

                <div id="matches-list-target"></div>
            </div>

            <div id="panel-categories" class="app-view">
                <div class="view-title">Categories</div>
                <div class="grid-layout" id="categories-grid-target"></div>
            </div>

            <div id="panel-settings" class="app-view">
                <div class="settings-top">
                    <div class="app-avatar"><i class="fa-solid fa-play" style="font-size: 26px; color: var(--neon-cyan);"></i></div>
                    <h3 style="font-size: 18px; font-weight: 600;">All Sports</h3>
                    <p style="color: var(--text-muted); font-size: 12px; margin-top: 4px;">Version 2.5 (Stable)</p>
                    
                    <div class="social-box">
                        <div class="social-circle" style="color: #24A1DE;"><i class="fa-brands fa-telegram"></i></div>
                        <div class="social-circle" style="color: #1877F2;"><i class="fa-brands fa-facebook"></i></div>
                        <div class="social-circle" style="color: #1DA1F2;"><i class="fa-brands fa-twitter"></i></div>
                        <div class="social-circle" style="color: #E1306C;"><i class="fa-brands fa-instagram"></i></div>
                    </div>
                </div>

                <div class="group-label">Playback Features</div>
                <div>
                    <div class="option-tile"><div class="tile-left"><i class="fa-solid fa-tower-broadcast"></i> Network Stream</div><i class="fa-solid fa-chevron-right" style="font-size: 12px; color: var(--text-muted);"></i></div>
                    <div class="option-tile"><div class="tile-left"><i class="fa-solid fa-list-ul"></i> Playlists</div><i class="fa-solid fa-chevron-right" style="font-size: 12px; color: var(--text-muted);"></i></div>
                    <div class="option-tile"><div class="tile-left"><i class="fa-solid fa-window-restore"></i> Floating Player</div><i class="fa-solid fa-chevron-right" style="font-size: 12px; color: var(--text-muted);"></i></div>
                    <div class="option-tile">
                        <div class="tile-left">
                            <i class="fa-solid fa-gear"></i>
                            <div><div>Force Low Quality</div><div style="font-size: 11px; color: var(--text-muted);">Forces lowest resolution on mobile data</div></div>
                        </div>
                        <div class="toggle-switch" onclick="this.classList.toggle('on')"></div>
                    </div>
                </div>
            </div>
        </div>

        <nav class="navbar-bottom">
            <div class="nav-link active" onclick="navigate('panel-live', this)"><i class="fa-solid fa-tv"></i><span>Home</span></div>
            <div class="nav-link" onclick="navigate('panel-categories', this)"><i class="fa-solid fa-grip"></i><span>Categories</span></div>
            <div class="nav-link" onclick="navigate('panel-live', this)"><i class="fa-solid fa-tower-broadcast"></i><span>Live Events</span></div>
            <div class="nav-link" onclick="navigate('panel-settings', this)"><i class="fa-solid fa-gears"></i><span>Settings</span></div>
        </nav>
    </div>

    <script>
        // ডাইনামিক ইন্টারনাল ডাটাবেস (গিটহাব পেজেস-এর জন্য একদম রেডি)
        const STATIC_DATA = {
            "stick_code": "6889177",
            "matches": [
                {
                    "id": 1,
                    "type": "featured",
                    "category": "Tennis | Roland-Garros",
                    "title": "ROLAND GARROS",
                    "badge_time": "05:11:58",
                    "bg_gradient": "linear-gradient(135deg, #b91c1c 0%, #450a0a 100%)",
                    "stream_url": "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
                },
                {
                    "id": 2,
                    "type": "vs_card",
                    "category": "CRICKET | ENGLAND VS NEW ZEALAND",
                    "team1": "England",
                    "team1_color": "#cf142b",
                    "team2": "New Zealand",
                    "team2_color": "#00247d",
                    "badge_time": "04:11:58",
                    "stream_url": "https://samples.tdtd.io/vlc.m3u8",
                    "servers": [
                        {"name": "W", "color": "#00f0ff"},
                        {"name": "W", "color": "#ff007f"},
                        {"name": "sky", "color": "#ff0000"},
                        {"name": "FOX", "color": "#00247d"}
                    ],
                    "total_servers": 5
                }
            ],
            "categories": [
                {"name": "Sports", "icon": "fa-trophy", "color": "#00f0ff"},
                {"name": "Bangla", "icon": "fa-circle-dot", "color": "#ff3b30"},
                {"name": "Kolkata", "icon": "fa-gopuram", "color": "#ff9500"},
                {"name": "India", "icon": "fa-flag", "color": "#34c759"},
                {"name": "Pakistan", "icon": "fa-star", "color": "#af52de"},
                {"name": "News", "icon": "fa-newspaper", "color": "#ffcc00"},
                {"name": "Entertainment", "icon": "fa-masks-theater", "color": "#5ac8fa"},
                {"name": "Movie", "icon": "fa-film", "color": "#ff2d55"},
                {"name": "Kids", "icon": "fa-child", "color": "#ff9500"},
                {"name": "Music", "icon": "fa-music", "color": "#4da6ff"}
            ]
        };

        // ভিউ নেভিগেশন কন্ট্রোল
        function navigate(panelId, targetNode) {
            document.querySelectorAll('.app-view').forEach(view => view.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            document.getElementById(panelId).classList.add('active');
            targetNode.classList.add('active');
        }

        // লাইভ স্ট্রিম প্লেয়ার ইঞ্জিন
        function injectStream(url) {
            const video = document.getElementById('live-video-element');
            const playerBox = document.getElementById('global-player-container');
            playerBox.classList.add('active');
            
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() { video.play(); });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function() { video.play(); });
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ইন্টারফেস রেন্ডারিং লজিক
        function initializeApp() {
            // মার্কি নোটিশ সেটআপ
            document.getElementById('ticker-space').textContent = `📢 stick code: ${STATIC_DATA.stick_code} .. Official website is "sportzxtv.com" .. Enjoy Live High Quality Streams!`;

            // লাইভ ম্যাচ কার্ড রেন্ডার
            const listTarget = document.getElementById('matches-list-target');
            listTarget.innerHTML = '';

            STATIC_DATA.matches.forEach(match => {
                let cardMarkup = '';
                if (match.type === 'featured') {
                    cardMarkup = `
                        <div class="match-card" onclick="injectStream('${match.stream_url}')">
                            <div class="card-top"><span class="time-badge">${match.badge_time}</span><span class="live-text"><span class="pulse-dot"></span> Live</span></div>
                            <div style="background: ${match.bg_gradient}; height: 110px; border-radius: 10px; display: flex; justify-content: center; align-items: center; margin-bottom: 10px;">
                                <span style="font-weight: 800; font-size: 20px; letter-spacing: 1.5px; text-shadow: 0 4px 10px rgba(0,0,0,0.5);">${match.title}</span>
                            </div>
                            <span style="font-size: 12px; color: var(--text-muted); font-weight:500;">${match.category}</span>
                        </div>`;
                } else if (match.type === 'vs_card') {
                    let serverBadges = match.servers.map(srv => `<div class="server-mini" style="color: ${srv.color}">${srv.name}</div>`).join('');
                    cardMarkup = `
                        <div class="match-card" onclick="injectStream('${match.stream_url}')">
                            <div class="card-top"><span style="font-size:11px; font-weight:bold; color:#94a3b8;">${match.category}</span></div>
                            <div class="team-container">
                                <div class="team-info">
                                    <div class="team-row"><div class="flag-icon" style="background:${match.team1_color}"></div> ${match.team1}</div>
                                    <div class="team-row"><div class="flag-icon" style="background:${match.team2_color}"></div> ${match.team2}</div>
                                </div>
                                <div style="text-align: right;">
                                    <span class="time-badge" style="display:inline-block; margin-bottom: 6px;">${match.badge_time}</span>
                                    <span class="live-text"><span class="pulse-dot"></span> Live</span>
                                </div>
                            </div>
                            <div class="card-bottom">
                                <div class="badge-list">${serverBadges}<div class="server-mini" style="color:#fff">+1</div></div>
                                <span style="font-size: 11px; color: var(--text-muted); font-weight:500;">${match.total_servers} Servers</span>
                            </div>
                        </div>`;
                }
                listTarget.innerHTML += cardMarkup;
            });

            // ক্যাটাগরি গ্রিড রেন্ডার
            const gridTarget = document.getElementById('categories-grid-target');
            gridTarget.innerHTML = '';
            STATIC_DATA.categories.forEach(cat => {
                gridTarget.innerHTML += `
                    <div class="grid-card">
                        <div class="grid-circle"><i class="fa-solid ${cat.icon}" style="color: ${cat.color}"></i></div>
                        <span>${cat.name}</span>
                    </div>`;
            });
        }

        window.addEventListener('DOMContentLoaded', initializeApp);
    </script>
</body>
</html>
