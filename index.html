<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Sports</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #090a10;
            --card-bg: #111424;
            --accent-blue: #00e5ff;
            --accent-pink: #ff007f;
            --text-color: #ffffff;
            --text-muted: #8fa0c0;
            --border-gradient: linear-gradient(45deg, #00e5ff, #ff007f);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        /* Header Styles */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: linear-gradient(to bottom, #131722, var(--bg-color));
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        header .header-icons i {
            font-size: 18px;
            margin-left: 20px;
            cursor: pointer;
            color: var(--text-color);
            transition: color 0.3s;
        }

        header .header-icons i:hover {
            color: var(--accent-blue);
        }

        /* Main Container */
        main {
            flex: 1;
            padding: 10px 15px 90px 15px;
            overflow-y: auto;
        }

        /* Horizontal Sports Icons */
        .sports-carousel {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 10px 5px;
            margin-bottom: 15px;
        }

        .sports-carousel::-webkit-scrollbar {
            display: none;
        }

        .sport-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 65px;
            cursor: pointer;
        }

        .sport-icon-wrapper {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: var(--card-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #232946;
            margin-bottom: 5px;
            font-size: 20px;
        }

        .sport-item.active .sport-icon-wrapper {
            border: 2px solid var(--accent-blue);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid #232946;
            font-size: 13px;
            cursor: pointer;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .tab.active {
            background: transparent;
            border: 1px solid var(--accent-blue);
            color: var(--text-color);
        }

        .tab .live-dot {
            width: 8px;
            height: 8px;
            background-color: #ff3366;
            border-radius: 50%;
            display: inline-block;
            animation: blink 1.2s infinite;
        }

        /* Video Player Layout */
        .video-container {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            position: relative;
            margin-bottom: 20px;
            border: 1px solid #232946;
        }

        .video-placeholder {
            width: 100%;
            aspect-ratio: 16/9;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&w=600&q=80');
            background-size: cover;
            background-position: center;
        }

        .player-controls-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 12px;
            background: rgba(0,0,0,0.4);
        }

        .player-top, .player-bottom-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .player-title {
            font-size: 14px;
            font-weight: 500;
        }

        .player-center {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }

        .play-btn {
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
        }

        .progress-bar-container {
            width: 100%;
            margin-bottom: 5px;
        }

        .timeline {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            position: relative;
        }

        .progress {
            width: 60%;
            height: 100%;
            background: var(--accent-pink);
            border-radius: 2px;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #ddd;
            margin-top: 4px;
        }

        /* Live Stream Match Cards */
        .match-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #1e2538;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .match-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--border-gradient);
            opacity: 0.7;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .live-tag {
            background: rgba(255, 0, 127, 0.15);
            color: var(--accent-pink);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
        }

        .teams-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
        }

        .team-row {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
            font-weight: 500;
        }

        .team-flag {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            object-fit: cover;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 12px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .server-badges {
            display: flex;
            gap: 6px;
        }

        .server-badge {
            background: #1c213a;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 10px;
            color: #fff;
            border: 1px solid #2d3554;
        }

        /* Categories Grid Layout */
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin: 15px 0 15px 0;
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .category-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 12px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            border: 1px solid #1e2538;
            transition: transform 0.2s;
        }

        .category-card:active {
            transform: scale(0.95);
        }

        .category-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e243d, #11152b);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 8px;
            font-size: 18px;
            color: var(--accent-blue);
        }

        .category-name {
            font-size: 11px;
            font-weight: 500;
            color: #e2e8f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        /* Bottom Navigation Bar */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: rgba(17, 20, 36, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid #1e2538;
            z-index: 100;
            border-radius: 20px 20px 0 0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            font-size: 11px;
            cursor: pointer;
            text-decoration: none;
            gap: 4px;
        }

        .nav-item i {
            font-size: 20px;
        }

        .nav-item.active {
            color: var(--accent-blue);
        }

        .nav-item.live-center {
            position: relative;
            color: var(--accent-pink);
        }

        @keyframes blink {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">SportzX</div>
        <div class="header-icons">
            <i class="fa-solid fa-rotate-right"></i>
            <i class="fa-solid fa-heart"></i>
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>
    </header>

    <main>
        
        <div class="video-container">
            <div class="video-placeholder">
                <div class="player-controls-overlay">
                    <div class="player-top">
                        <i class="fa-solid fa-arrow-left"></i>
                        <span class="player-title">Liechtenstein vs Cyprus</span>
                        <i class="fa-solid fa-sliders"></i>
                    </div>
                    <div class="player-center">
                        <i class="fa-solid fa-backward"></i>
                        <div class="play-btn">
                            <i class="fa-solid fa-pause"></i>
                        </div>
                        <i class="fa-solid fa-forward"></i>
                    </div>
                    <div class="progress-bar-container">
                        <div class="timeline">
                            <div class="progress"></div>
                        </div>
                        <div class="time-info">
                            <span>59:27</span>
                            <span>1:00:00</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="sports-carousel">
            <div class="sport-item active">
                <div class="sport-icon-wrapper"><i class="fa-solid fa-globe"></i></div>
                <span style="font-size: 11px;">All</span>
            </div>
            <div class="sport-item">
                <div class="sport-icon-wrapper"><i class="fa-solid fa-baseball-bat-ball"></i></div>
                <span style="font-size: 11px;">Cricket</span>
            </div>
            <div class="sport-item">
                <div class="sport-icon-wrapper"><i class="fa-solid fa-bolt"></i></div>
                <span style="font-size: 11px;">WWE</span>
            </div>
            <div class="sport-item">
                <div class="sport-icon-wrapper"><i class="fa-solid fa-flag-checkered"></i></div>
                <span style="font-size: 11px;">F1</span>
            </div>
            <div class="sport-item">
                <div class="sport-icon-wrapper"><i class="fa-solid fa-table-tennis-pools"></i></div>
                <span style="font-size: 11px;">Tennis</span>
            </div>
        </div>

        <div class="filter-tabs">
            <div class="tab active"><i class="fa-solid fa-check"></i> All (33)</div>
            <div class="tab"><span class="live-dot"></span> Live now (4)</div>
            <div class="tab">Today's (14)</div>
        </div>

        <div class="match-card">
            <div class="card-header">
                <span>Cricket | England vs New Zealand</span>
                <span class="live-tag">● LIVE</span>
            </div>
            <div class="teams-container">
                <div class="team-row">
                    <img class="team-flag" src="https://flagcdn.com/w40/gb-eng.png" alt="England">
                    <span>England</span>
                </div>
                <div class="team-row">
                    <img class="team-flag" src="https://flagcdn.com/w40/nz.png" alt="New Zealand">
                    <span>New Zealand</span>
                </div>
            </div>
            <div class="card-footer">
                <div class="server-badges">
                    <span class="server-badge">Sky Sports</span>
                    <span class="server-badge">Willow</span>
                    <span class="server-badge">Fox</span>
                </div>
                <span>5 Servers</span>
            </div>
        </div>

        <div class="section-title">Categories</div>
        <div class="categories-grid">
            <div class="category-card">
                <div class="category-icon"><i class="fa-solid fa-trophy"></i></div>
                <div class="category-name">Sports</div>
            </div>
            <div class="category-card">
                <div class="category-icon"><i class="fa-solid fa-language"></i></div>
                <div class="category-name">Bangla</div>
            </div>
            <div class="category-card">
                <div class="category-icon"><i class="fa-solid fa-map-location-dot"></i></div>
                <div class="category-name">Kolkata</div>
            </div>
            <div class="category-card">
                <div class="category-icon"><i class="fa-solid fa-flag"></i></div>
                <div class="category-name">India</div>
            </div>
            <div class="category-card">
                <div class="category-icon"><i class="fa-solid fa-newspaper"></i></div>
                <div class="category-name">News</div>
            </div>
            <div class="category-card">
                <div class="category-icon"><i class="fa-solid fa-masks-theater"></i></div>
                <div class="category-name">Movie</div>
            </div>
            <div class="category-card">
                <div class="category-icon"><i class="fa-solid fa-child"></i></div>
                <div class="category-name">Kids</div>
            </div>
            <div class="category-card">
                <div class="category-icon"><i class="fa-solid fa-music"></i></div>
                <div class="category-name">Music</div>
            </div>
        </div>

    </main>

    <nav class="bottom-nav">
        <a href="#" class="nav-item">
            <i class="fa-solid fa-tv"></i>
            <span>Home</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-list"></i>
            <span>Categories</span>
        </a>
        <a href="#" class="nav-item live-center active">
            <i class="fa-solid fa-tower-broadcast"></i>
            <span>Live Events</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-gear"></i>
            <span>Settings</span>
        </a>
    </nav>

</body>
</html>
